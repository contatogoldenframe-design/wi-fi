<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Rede Mãe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="logo" style="text-decoration:none;">
                <div class="logo-icon">RM</div>
                <span class="logo-text">Rede Mãe</span>
            </a>
            <h1 class="auth-title">Criar conta</h1>
            <p class="auth-subtitle">Preencha os dados para ativar seu eSIM gratuito.</p>

            <form id="formCadastro">
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" class="form-input" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" class="form-input" placeholder="(11) 99999-9999" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cpf">CPF / CNPJ</label>
                        <input type="text" id="cpf" class="form-input" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" class="form-input" placeholder="São Paulo" required>
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <select id="estado" class="form-input" required>
                            <option value="">Selecione</option>
                            <option value="AC">AC</option><option value="AL">AL</option>
                            <option value="AP">AP</option><option value="AM">AM</option>
                            <option value="BA">BA</option><option value="CE">CE</option>
                            <option value="DF">DF</option><option value="ES">ES</option>
                            <option value="GO">GO</option><option value="MA">MA</option>
                            <option value="MT">MT</option><option value="MS">MS</option>
                            <option value="MG">MG</option><option value="PA">PA</option>
                            <option value="PB">PB</option><option value="PR">PR</option>
                            <option value="PE">PE</option><option value="PI">PI</option>
                            <option value="RJ">RJ</option><option value="RN">RN</option>
                            <option value="RS">RS</option><option value="RO">RO</option>
                            <option value="RR">RR</option><option value="SC">SC</option>
                            <option value="SP">SP</option><option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">Li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full" id="btnCadastro">
                    Ativar meu eSIM Grátis
                </button>

                <div class="form-footer">
                    Já tem conta? <a href="login.html">Fazer login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnCadastro');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Ativando...';
            btn.disabled = true;

            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                cpf: document.getElementById('cpf').value,
                senha: document.getElementById('senha').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                termos: document.getElementById('termos').checked
            };

            try {
                const result = await api.cadastro(dados);
                localStorage.setItem('token', result.token);
                localStorage.setItem('usuario', JSON.stringify(result.usuario));
                if (result.esim) {
                    localStorage.setItem('esim', JSON.stringify(result.esim));
                }
                window.location.href = 'painel.html';
            } catch (err) {
                alert(err.error || 'Erro ao cadastrar. Tente novamente.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Máscara de telefone
        document.getElementById('telefone').addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 6) {
                value = `(${value.slice(0,2)}) ${value.slice(2,7)}-${value.slice(7)}`;
            } else if (value.length > 2) {
                value = `(${value.slice(0,2)}) ${value.slice(2)}`;
            }
            this.value = value;
        });

        // Máscara de CPF
        document.getElementById('cpf').addEventListener('input', function() {
            let value = this.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 9) {
                value = `${value.slice(0,3)}.${value.slice(3,6)}.${value.slice(6,9)}-${value.slice(9)}`;
            } else if (value.length > 6) {
                value = `${value.slice(0,3)}.${value.slice(3,6)}.${value.slice(6)}`;
            } else if (value.length > 3) {
                value = `${value.slice(0,3)}.${value.slice(3)}`;
            }
            this.value = value;
        });
    </script>
</body>
</html>
